openapi: 3.0.3
info:
  title: ConsoleCatalog API
  version: 1.0.0
  description: REST API for iconic consoles, games, franchises, brands, users, and reviews.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Auth
    description: Registration and login
  - name: Brands
    description: Brand catalog endpoints
  - name: Consoles
    description: Console catalog endpoints
  - name: Franchises
    description: Franchise catalog endpoints
  - name: Games
    description: Game catalog endpoints
  - name: Reviews
    description: Review endpoints
  - name: Users
    description: User profile and admin endpoints
paths:
  /:
    get:
      summary: Welcome message
      tags:
        - Auth
      responses:
        "200":
          description: API welcome message
          content:
            text/plain:
              schema:
                type: string
              example: Welcome to the ConsoleCatalog API of VicH!

  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              name: Vic
              email: vic@example.com
              password: password123
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/login:
    post:
      summary: Login a user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: vic@example.com
              password: password123
      responses:
        "200":
          description: JWT token returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                required:
                  - token
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/brands:
    get:
      summary: Get all brands
      tags:
        - Brands
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a brand
      tags:
        - Brands
      security:
        - ApiTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/brands/{id}:
    get:
      summary: Get a brand by id
      tags:
        - Brands
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Brand found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      summary: Update a brand
      tags:
        - Brands
      security:
        - ApiTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "200":
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Delete a brand
      tags:
        - Brands
      security:
        - ApiTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Brand deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/consoles:

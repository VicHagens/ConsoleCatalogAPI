      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    ApiTokenAuth:
      type: apiKey
      in: header
      name: x-auth-token
      description: JWT token returned by `/api/auth/login`.

  parameters:
    id:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
      example: 665f1e5a9a2f1a0012b34567
    gameId:
      name: gameId
      in: path
      required: true
      description: MongoDB ObjectId of the game
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
      example: 665f1e5a9a2f1a0012b34567

  responses:
    BadRequest:
      description: Invalid input, invalid ObjectId, invalid token, or duplicate data
      content:
        text/plain:
          schema:
            type: string
          example: Invalid game id.
    Unauthorized:
      description: Missing authentication token
      content:
        text/plain:
          schema:
            type: string
          example: Access denied. No token provided.
    Forbidden:
      description: Authenticated user is not allowed to perform this action
      content:
        text/plain:
          schema:
            type: string
          example: Access denied.
    NotFound:
      description: Requested resource was not found
      content:
        text/plain:
          schema:
            type: string
          example: Game not found.
    InternalServerError:
      description: Unexpected server error
      content:
        text/plain:
          schema:
            type: string
          example: Internal Server Error

  schemas:
    ObjectId:
      type: string
      pattern: "^[a-fA-F0-9]{24}$"
      example: 665f1e5a9a2f1a0012b34567

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Vic
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
          example: vic@example.com
        password:
          type: string
          minLength: 8
          maxLength: 255
          format: password
          example: password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
          example: vic@example.com
        password:
          type: string
          minLength: 8
          maxLength: 255
          format: password
          example: password123

    BrandInput:
      type: object
      required:
        - name
        - country
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Nintendo
        country:
          type: string
          minLength: 2
          maxLength: 100
          example: Japan
        foundedYear:
          type: integer
          minimum: 1800
          example: 1889
        description:
          type: string
          maxLength: 1000
          example: Japanese video game company.

    Brand:
      allOf:
        - $ref: "#/components/schemas/BrandInput"
        - type: object
          required:
            - _id
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"

    FranchiseInput:
      type: object
      required:

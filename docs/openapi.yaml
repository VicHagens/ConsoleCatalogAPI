            $ref: "#/components/schemas/ObjectId"
        publisher:
          $ref: "#/components/schemas/ObjectId"
        releaseYear:
          type: integer
          minimum: 1970
          example: 1986
        genre:
          type: string
          minLength: 2
          maxLength: 100
          example: Action-adventure
        description:
          type: string
          maxLength: 1000
          example: Explore Hyrule and rescue Princess Zelda.
        releaseInfo:
          $ref: "#/components/schemas/ReleaseInfo"

    Game:
